name: Update Firestick Playlist + EPG

on:
  schedule:
    - cron: "0 3 * * *"  # Daily at 3 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - run: pip install -r requirements.txt

      - name: Generate playlist and EPG
        run: python generate.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          if [ -f firestick.m3u ] && [ -f epg.xml ]; then
              git add firestick.m3u epg.xml
              git commit -m "Auto update playlist + epg" || echo "No changes"
              git push
          else
              echo "Files missing, skipping commit"
          fi
